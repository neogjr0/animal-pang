<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>🐾 Animal Bubble Pop</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none}
:root{--bg:#1a0a2e;--purple:#c084fc;--purple2:#7c3aed;--txt:#f0e6ff;--sub:#9370bb}
html,body{height:100%;height:100dvh;background:#0d0520;font-family:'Nunito',sans-serif;overflow:hidden}
#app{
  width:100%;max-width:420px;
  height:100%;height:100dvh;
  margin:0 auto;background:var(--bg);
  display:flex;flex-direction:column;
  position:relative;overflow:hidden;
  padding-top:env(safe-area-inset-top,0px);
  padding-bottom:env(safe-area-inset-bottom,0px);
}

#hdr{padding:5px 14px 4px;flex-shrink:0;background:linear-gradient(180deg,#2d0f4e,#1a0a2e);border-bottom:1px solid rgba(192,132,252,.2)}
#hdr-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
#lv-badge{background:var(--purple2);color:#fff;font-size:11px;font-weight:900;padding:3px 12px;border-radius:20px}
#score-area{text-align:center}
#timer-area{text-align:right;min-width:60px}
.hdr-lbl{font-size:9px;color:var(--sub);letter-spacing:.1em;font-weight:700}
.hdr-val{font-size:20px;font-weight:900;color:var(--txt);line-height:1}
#timer-val.danger{color:#f87171;animation:tpulse .4s infinite alternate}
#timer-val.critical{color:#ff2020;animation:tpulse .18s infinite alternate}
@keyframes tpulse{to{transform:scale(1.15)}}
#score-goal-label{font-size:9px;color:#fbbf24;font-weight:700;text-align:right;margin-bottom:2px}
#score-goal-track{height:4px;background:rgba(250,200,50,.15);border-radius:99px;overflow:hidden;margin-bottom:5px}
#score-goal-bar{height:100%;background:linear-gradient(90deg,#fbbf24,#f59e0b);border-radius:99px;width:0%;transition:width .4s}

#tgt-panel{background:rgba(0,0,0,.2);border-radius:10px;padding:5px 7px 4px;border:1px solid rgba(192,132,252,.12)}
#tgt-panel-title{font-size:9px;color:var(--sub);font-weight:700;margin-bottom:4px;display:flex;justify-content:space-between}
#tgt-panel-title span{color:var(--purple);font-size:9px}
#tgt-grid{display:grid;gap:3px}
.tgt-item{display:flex;align-items:center;gap:5px;background:rgba(255,255,255,.04);border-radius:7px;padding:3px 6px;border:1px solid rgba(255,255,255,.05);transition:background .25s,border-color .25s}
.tgt-item.done-item{background:rgba(74,222,128,.1);border-color:rgba(74,222,128,.28)}
.tgt-icon-wrap{width:28px;height:28px;flex-shrink:0}
.tgt-bar-wrap{flex:1}
.tgt-name-row{display:flex;justify-content:space-between}
.tgt-name{font-size:8px;color:var(--sub);font-weight:700}
.tgt-count{font-size:9px;font-weight:900;color:var(--txt)}
.tgt-count.done-count{color:#4ade80}
.tgt-track{height:4px;background:rgba(255,255,255,.1);border-radius:99px;overflow:hidden;margin-top:2px}
.tgt-fill{height:100%;border-radius:99px;transition:width .35s cubic-bezier(.34,1.2,.64,1)}
.tgt-fill.fill-done{background:linear-gradient(90deg,#4ade80,#22c55e)!important}
.tgt-check{font-size:12px;flex-shrink:0;opacity:0;transition:opacity .25s}
.tgt-item.done-item .tgt-check{opacity:1}

#board-wrap{flex:1;position:relative;overflow:hidden;display:flex;align-items:center;justify-content:center}
#gc{display:block;touch-action:none}

#combo-badge,#allclear-badge,#score-warn,#stage-clear-toast{
  position:absolute;left:50%;color:#fff;font-weight:900;border-radius:99px;
  pointer-events:none;z-index:10;white-space:nowrap;
  transform:translateX(-50%) scale(0);opacity:0;
  transition:transform .2s cubic-bezier(.34,1.56,.64,1),opacity .2s;
}
#combo-badge{top:50%;background:linear-gradient(135deg,#c084fc,#818cf8);font-size:22px;padding:7px 20px;box-shadow:0 4px 20px rgba(192,132,252,.5)}
#combo-badge.show{transform:translate(-50%,-50%) scale(1);opacity:1}
#allclear-badge{top:38%;background:linear-gradient(135deg,#f59e0b,#ef4444);font-size:18px;padding:9px 22px;z-index:13}
#allclear-badge.show{transform:translate(-50%,-50%) scale(1);opacity:1}
#score-warn{top:50%;background:linear-gradient(135deg,#ef4444,#dc2626);font-size:15px;padding:7px 16px;z-index:12}
#score-warn.show{transform:translate(-50%,-50%) scale(1);opacity:1}
#stage-clear-toast{top:50%;background:linear-gradient(135deg,#22c55e,#16a34a);font-size:17px;padding:12px 26px;z-index:14}
#stage-clear-toast.show{transform:translate(-50%,-50%) scale(1);opacity:1}
.fscore{position:absolute;font-size:14px;font-weight:900;color:#fde68a;pointer-events:none;z-index:11;white-space:nowrap;animation:floatUp .7s forwards;text-shadow:0 2px 5px rgba(0,0,0,.6)}
@keyframes floatUp{0%{opacity:1;transform:translateY(0)}100%{opacity:0;transform:translateY(-44px)}}
#timer-flash{position:absolute;inset:0;pointer-events:none;z-index:5;background:rgba(255,30,30,0);transition:background .1s}
#timer-flash.pulse{background:rgba(255,30,30,.12)}

/* ── 하단 ── */
#btm{padding:5px 12px 8px;flex-shrink:0;background:linear-gradient(0deg,#2d0f4e,#1a0a2e);border-top:1px solid rgba(192,132,252,.2);display:flex;gap:8px;align-items:center}
#item-btns{display:flex;gap:6px;flex:1}
.item-btn{
  height:52px;flex:1;
  background:rgba(192,132,252,.08);border:1.5px solid rgba(192,132,252,.18);border-radius:14px;
  cursor:pointer;position:relative;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1px;
  transition:transform .1s,background .15s;padding:3px 2px 2px;overflow:visible;
}
.item-btn:active{transform:scale(.90);background:rgba(192,132,252,.22)}
.item-btn.used{opacity:.35;pointer-events:none}
.item-btn canvas{display:block;pointer-events:none;flex-shrink:0}
.item-btn-label{font-size:8px;font-weight:900;color:var(--sub);line-height:1;margin-top:1px}
.item-btn-badge{
  position:absolute;top:2px;right:3px;
  font-size:11px;line-height:1;pointer-events:none;
}
.item-btn-cnt{
  position:absolute;bottom:2px;right:4px;
  font-size:10px;font-weight:900;color:#fbbf24;line-height:1;
}
#pause-btn{width:44px;height:52px;flex-shrink:0;background:rgba(192,132,252,.1);border:1px solid rgba(192,132,252,.18);border-radius:13px;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--purple);transition:transform .1s}
#pause-btn:active{transform:scale(.91)}

/* ── 팝업 ── */
.overlay{position:absolute;inset:0;background:rgba(8,3,18,.78);display:flex;align-items:center;justify-content:center;z-index:30;opacity:0;pointer-events:none;transition:opacity .22s}
.overlay.on{opacity:1;pointer-events:all}
.popup{background:linear-gradient(160deg,#2e1050,#180928);border:1px solid rgba(192,132,252,.28);border-radius:26px;padding:24px 20px 18px;width:300px;text-align:center;transform:scale(.86);transition:transform .26s cubic-bezier(.34,1.56,.64,1);box-shadow:0 24px 64px rgba(0,0,0,.65)}
.overlay.on .popup{transform:scale(1)}
.popup-icon{font-size:44px;margin-bottom:4px}
.popup h2{font-size:21px;font-weight:900;color:var(--txt);margin-bottom:3px}
.popup .sub{font-size:12px;color:var(--sub);margin-bottom:6px}
.big-num{font-size:40px;font-weight:900;color:var(--purple);line-height:1;margin-bottom:12px}
.stat-row{display:flex;gap:8px;margin-bottom:12px}
.stat{flex:1;background:rgba(192,132,252,.07);border-radius:12px;padding:8px 4px}
.stat-l{font-size:9px;color:var(--sub);font-weight:700}
.stat-v{font-size:16px;font-weight:900;color:var(--txt);margin-top:2px}
.btn-p{width:100%;padding:12px;border:none;border-radius:16px;background:linear-gradient(135deg,#c084fc,#818cf8);color:#fff;font-size:14px;font-weight:900;cursor:pointer;font-family:'Nunito',sans-serif;margin-bottom:7px;box-shadow:0 4px 16px rgba(192,132,252,.35);transition:transform .1s}
.btn-p:active{transform:scale(.97)}
.btn-s{width:100%;padding:9px;border:none;border-radius:12px;background:rgba(192,132,252,.1);color:var(--sub);font-size:12px;font-weight:700;cursor:pointer;font-family:'Nunito',sans-serif}
#nick-input{width:100%;padding:10px 12px;border-radius:12px;border:1.5px solid rgba(192,132,252,.28);background:rgba(192,132,252,.07);color:var(--txt);font-size:15px;font-weight:700;font-family:'Nunito',sans-serif;margin-bottom:10px;outline:none;text-align:center}
#nick-input:focus{border-color:var(--purple)}
#rank-list{text-align:left;margin-bottom:11px;max-height:230px;overflow-y:auto}
.ri{display:flex;align-items:center;gap:8px;padding:6px 9px;border-radius:9px;margin-bottom:3px;background:rgba(192,132,252,.05)}
.ri.me{background:rgba(192,132,252,.16);border:1px solid rgba(192,132,252,.28)}
.rno{font-size:12px;font-weight:900;color:var(--sub);min-width:20px}
.rno.g{color:#fbbf24}.rno.s{color:#94a3b8}.rno.b{color:#cd7f32}
.rname{flex:1;font-size:12px;font-weight:700;color:var(--txt)}
.rscore{font-size:12px;font-weight:900;color:var(--purple)}
</style>
</head>
<body>
<div id="app">
  <div id="hdr">
    <div id="hdr-row">
      <div id="lv-badge">ST.1</div>
      <div id="score-area"><div class="hdr-lbl">SCORE</div><div class="hdr-val" id="score-val">0</div></div>
      <div id="timer-area"><div class="hdr-lbl">TIME</div><div class="hdr-val" id="timer-val">1:00</div></div>
    </div>
    <div id="score-goal-label">목표점수 0 / 0</div>
    <div id="score-goal-track"><div id="score-goal-bar"></div></div>
    <div id="tgt-panel">
      <div id="tgt-panel-title">🎯 목표 진행 현황<span id="tgt-panel-summary">0/0 완료</span></div>
      <div id="tgt-grid"></div>
    </div>
  </div>

  <div id="board-wrap">
    <canvas id="gc"></canvas>
    <div id="combo-badge"></div>
    <div id="allclear-badge"></div>
    <div id="score-warn"></div>
    <div id="stage-clear-toast"></div>
    <div id="timer-flash"></div>
  </div>

  <div id="btm">
    <div id="item-btns"></div>
    <button id="pause-btn" onclick="togglePause()">⏸</button>
  </div>

  <div class="overlay" id="ov-over">
    <div class="popup">
      <div class="popup-icon" id="over-icon">⏰</div>
      <h2 id="over-title">시간 종료!</h2>
      <div class="sub" id="over-sub">최종 점수</div>
      <div class="big-num" id="over-score">0</div>
      <div class="stat-row">
        <div class="stat"><div class="stat-l">최대 콤보</div><div class="stat-v" id="over-combo">0x</div></div>
        <div class="stat"><div class="stat-l">팝 개수</div><div class="stat-v" id="over-pops">0개</div></div>
        <div class="stat"><div class="stat-l">목표 달성</div><div class="stat-v" id="over-goal">미달</div></div>
      </div>
      <input id="nick-input" type="text" maxlength="8" placeholder="닉네임 (최대 8자)">
      <button class="btn-p" onclick="submitScore()">🏆 점수 등록 & 랭킹</button>
      <button class="btn-s" onclick="restart()">다시 시작</button>
    </div>
  </div>

  <div class="overlay" id="ov-rank">
    <div class="popup">
      <div class="popup-icon">🏆</div><h2>TOP 30 랭킹</h2>
      <div id="rank-list"></div>
      <button class="btn-p" onclick="restart()">다시 도전!</button>
    </div>
  </div>

  <div class="overlay" id="ov-clear">
    <div class="popup">
      <div class="popup-icon">🎉</div>
      <h2>STAGE CLEAR!</h2>
      <div class="sub" id="clear-sub">완벽해요!</div>
      <div class="big-num" id="clear-score">0</div>
      <div class="stat-row">
        <div class="stat"><div class="stat-l">이동 횟수</div><div class="stat-v" id="clear-moves">0</div></div>
        <div class="stat"><div class="stat-l">최대 콤보</div><div class="stat-v" id="clear-combo" style="color:var(--purple)">0x</div></div>
      </div>
      <button class="btn-p" id="next-btn" onclick="nextLevel()">다음 스테이지 →</button>
    </div>
  </div>

  <div class="overlay" id="ov-pause">
    <div class="popup">
      <div class="popup-icon">⏸</div>
      <h2>일시정지</h2><div class="sub" style="margin-bottom:18px">잠깐 쉬어가요</div>
      <button class="btn-p" onclick="togglePause()">계속하기 ▶</button>
      <button class="btn-s" onclick="restart()">처음부터</button>
    </div>
  </div>
</div>

<script>
// ══════════════════════════════════════════
// CONFIG
// ══════════════════════════════════════════
const COLS=7, ROWS=8;
const ANIMALS=['dog','cat','pig','raccoon','bear'];

const ACOL={
  dog:    {base:'#ffdfb2',ear:'#e8b56a',nose:'#7a3020',cheek:'#ffaa6a',hl:'rgba(255,255,255,.52)'},
  cat:    {base:'#b3d4ff',ear:'#7aaae8',nose:'#bb6688',cheek:'#8ebef0',hl:'rgba(255,255,255,.52)'},
  raccoon:{base:'#c0c0cc',ear:'#686878',nose:'#282838',cheek:'#d8d8e4',hl:'rgba(255,255,255,.42)'},
  pig:    {base:'#ffb3c6',ear:'#ff88a0',nose:'#dd6677',cheek:'#ff9aae',hl:'rgba(255,255,255,.52)'},
  bear:   {base:'#d4a574',ear:'#b07840',nose:'#502810',cheek:'#c89060',hl:'rgba(255,255,255,.46)'},
};
const CCSS={dog:'#ffdfb2',cat:'#b3d4ff',raccoon:'#c0c0cc',pig:'#ffb3c6',bear:'#d4a574'};
const ANIMAL_COLOR={dog:'#ffdfb2',cat:'#b3d4ff',raccoon:'#c0c0cc',pig:'#ffb3c6',bear:'#d4a574'};
const ANIMAL_NAME={dog:'강아지',cat:'고양이',raccoon:'너구리',pig:'돼지',bear:'곰'};

// ── 아이템 정의 (순서 고정: 폭탄→십자→리폼) ──
const ITEM_DEFS=[
  {id:'bomb',  label:'폭탄', animalType:'dog',  badge:'💣'},
  {id:'cross', label:'십자', animalType:'cat',  badge:'✚'},
  {id:'reform',label:'리폼', animalType:'pig',  badge:'🔀'},
];

// ── 30스테이지 생성 — 난이도 강화 버전 ──
// ST1~5: 3종, ST6~12: 4종, ST13~30: 5종
// 시간: ST1=55초, 매 스테이지 -1.5초, 최소 18초
// 목표수: 빠르게 증가, 점수목표도 가파르게
function makeLevels(){
  const lvs=[];
  for(let i=0;i<30;i++){
    const st=i+1;
    const tier = st<=5?0 : st<=12?1 : 2;
    const types = [3,4,5][tier];
    const timeLimit = Math.max(18, Math.round(55 - (st-1)*1.5));
    const scoreGoal = Math.round(st*st*55 + st*400 + 800);
    const pointPer  = 10 + tier*5;
    // 목표 수: 2.5배 상향 — 스테이지당 확 느껴지게
    const base = 14 + Math.round(st*2.2);
    const tgt={};
    ANIMALS.slice(0,types).forEach((a,idx)=>{
      tgt[a]=Math.max(10, base - idx*2);
    });
    const itemSlots = st<=4?1 : st<=12?2 : 3;
    lvs.push({st,types,timeLimit,scoreGoal,pointPer,tgt,itemSlots});
  }
  return lvs;
}
const LEVELS=makeLevels();
const RANK_KEY='abp_v5';

// ══════════════════════════════════════════
// CANVAS (메인 보드)
// ══════════════════════════════════════════
const canvas=document.getElementById('gc');
const ctx=canvas.getContext('2d');
let CELL=44;

function resizeCanvas(){
  const w=document.getElementById('board-wrap');
  CELL=Math.floor(Math.min(w.clientWidth/COLS, w.clientHeight/ROWS));
  canvas.width=CELL*COLS; canvas.height=CELL*ROWS;
}

// ══════════════════════════════════════════
// 공통 동물 그리기 — tctx 인자로 어느 캔버스에나 사용
// ══════════════════════════════════════════
function drawAnimalCtx(tctx, cx, cy, type, sz, alpha=1, scale=1){
  const C=ACOL[type], r=sz*.44*scale;
  tctx.save(); tctx.globalAlpha=alpha; tctx.translate(cx,cy);
  tctx.beginPath(); tctx.arc(0,0,r,0,Math.PI*2); tctx.fillStyle=C.base; tctx.fill();

  if(type==='cat'){
    [-1,1].forEach(s=>{
      tctx.save(); tctx.translate(s*r*.5,-r*.65);
      tctx.beginPath(); tctx.moveTo(0,-r*.44); tctx.lineTo(r*.3,r*.1); tctx.lineTo(-r*.3,r*.1); tctx.closePath();
      tctx.fillStyle=C.ear; tctx.fill();
      tctx.beginPath(); tctx.moveTo(0,-r*.28); tctx.lineTo(r*.15,r*.06); tctx.lineTo(-r*.15,r*.06); tctx.closePath();
      tctx.fillStyle='#f8c0d0'; tctx.fill(); tctx.restore();
    });
  } else if(type==='bear'){
    [[-r*.58,-r*.62],[r*.58,-r*.62]].forEach(([ex,ey])=>{
      tctx.beginPath(); tctx.arc(ex,ey,r*.28,0,Math.PI*2); tctx.fillStyle=C.ear; tctx.fill();
      tctx.beginPath(); tctx.arc(ex,ey,r*.16,0,Math.PI*2); tctx.fillStyle='#e8b888'; tctx.fill();
    });
  } else if(type==='dog'){
    [[-r*.73,r*.04],[r*.73,r*.04]].forEach(([ex,ey])=>{
      tctx.beginPath(); tctx.ellipse(ex,ey,r*.26,r*.34,0,0,Math.PI*2); tctx.fillStyle=C.ear; tctx.fill();
    });
  } else if(type==='raccoon'){
    [[-r*.62,-r*.52],[r*.62,-r*.52]].forEach(([ex,ey])=>{
      tctx.beginPath(); tctx.arc(ex,ey,r*.22,0,Math.PI*2); tctx.fillStyle=C.ear; tctx.fill();
    });
    [[-r*.28,0],[r*.28,0]].forEach(([ex,ey])=>{
      tctx.beginPath(); tctx.ellipse(ex,ey,r*.22,r*.18,0,0,Math.PI*2);
      tctx.fillStyle='rgba(30,30,50,.3)'; tctx.fill();
    });
  } else if(type==='pig'){
    [[-r*.55,-r*.52],[r*.55,-r*.52]].forEach(([ex,ey])=>{
      tctx.beginPath(); tctx.arc(ex,ey,r*.24,0,Math.PI*2); tctx.fillStyle=C.ear; tctx.fill();
    });
  }

  [[-r*.27,-r*.1],[r*.27,-r*.1]].forEach(([ex,ey])=>{
    tctx.beginPath(); tctx.ellipse(ex,ey,r*.13,r*.15,0,0,Math.PI*2); tctx.fillStyle='#160820'; tctx.fill();
    tctx.beginPath(); tctx.arc(ex+r*.05,ey-r*.05,r*.04,0,Math.PI*2); tctx.fillStyle='#fff'; tctx.fill();
  });
  [[-r*.5,r*.26],[r*.5,r*.26]].forEach(([ex,ey])=>{
    tctx.beginPath(); tctx.ellipse(ex,ey,r*.2,r*.13,0,0,Math.PI*2);
    tctx.fillStyle=C.cheek; tctx.globalAlpha=alpha*.52; tctx.fill(); tctx.globalAlpha=alpha;
  });
  if(type==='pig'){
    tctx.beginPath(); tctx.ellipse(0,r*.27,r*.22,r*.15,0,0,Math.PI*2); tctx.fillStyle=C.nose; tctx.fill();
    [[-r*.1,r*.29],[r*.1,r*.29]].forEach(([nx,ny])=>{
      tctx.beginPath(); tctx.arc(nx,ny,r*.055,0,Math.PI*2); tctx.fillStyle='rgba(60,10,20,.55)'; tctx.fill();
    });
  } else {
    tctx.beginPath(); tctx.ellipse(0,r*.25,r*.13,r*.1,0,0,Math.PI*2); tctx.fillStyle=C.nose; tctx.fill();
  }
  tctx.beginPath(); tctx.ellipse(-r*.16,-r*.3,r*.2,r*.12,-0.4,0,Math.PI*2); tctx.fillStyle=C.hl; tctx.fill();
  tctx.restore();
}

// 메인 보드용 래퍼 (전역 ctx 사용)
function drawAnimal(cx,cy,type,sz,alpha=1,scale=1){
  drawAnimalCtx(ctx,cx,cy,type,sz,alpha,scale);
}

function drawSpecial(cx,cy,special,sz){
  const r=sz*.46;
  ctx.save(); ctx.translate(cx,cy);
  ctx.beginPath(); ctx.arc(0,0,r,0,Math.PI*2); ctx.fillStyle='rgba(15,5,30,.62)'; ctx.fill();
  if(special==='bomb'){
    ctx.strokeStyle='#fbbf24'; ctx.lineWidth=2.5; ctx.stroke();
    ctx.font=`${Math.round(sz*.42)}px serif`;
    ctx.textAlign='center'; ctx.textBaseline='middle'; ctx.fillText('💣',0,2);
  } else {
    ctx.strokeStyle='#c084fc'; ctx.lineWidth=2.5; ctx.stroke();
    ctx.strokeStyle='rgba(192,132,252,.82)'; ctx.lineWidth=2;
    ctx.beginPath(); ctx.moveTo(-r*.72,0); ctx.lineTo(r*.72,0); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(0,-r*.72); ctx.lineTo(0,r*.72); ctx.stroke();
    ctx.font=`${Math.round(sz*.32)}px serif`;
    ctx.textAlign='center'; ctx.textBaseline='middle'; ctx.fillText('✨',0,2);
  }
  ctx.restore();
}

// ══════════════════════════════════════════
// PARTICLES
// ══════════════════════════════════════════
let particles=[],flashAlpha=0,shake={x:0,y:0,f:0};

function spawnParticles(cx,cy,color,count){
  const n=Math.min(8+count*2,22);
  for(let i=0;i<n;i++){
    const a=(Math.PI*2/n)*i+Math.random()*.4, spd=2.5+Math.random()*4.5;
    particles.push({x:cx,y:cy,vx:Math.cos(a)*spd,vy:Math.sin(a)*spd-1.8,sz:3+Math.random()*5,color,life:1,decay:.026+Math.random()*.024,star:Math.random()>.5});
  }
  if(count>=5){flashAlpha=Math.min(.4,count*.065);shake.f=count>=6?10:5;}
  if(navigator.vibrate) navigator.vibrate(count>=5?[25,8,25]:[12]);
}

function updateParticles(dt){
  particles.forEach(p=>{p.x+=p.vx*dt*.055;p.y+=p.vy*dt*.055;p.vy+=.16;p.life-=p.decay;p.sz*=.974;});
  particles=particles.filter(p=>p.life>0);
  if(flashAlpha>0) flashAlpha=Math.max(0,flashAlpha-.032);
  if(shake.f>0){shake.x=(Math.random()-.5)*shake.f*1.6;shake.y=(Math.random()-.5)*shake.f;shake.f--;}
  else{shake.x=0;shake.y=0;}
}

function renderParticles(){
  particles.forEach(p=>{
    ctx.save(); ctx.globalAlpha=Math.max(0,p.life); ctx.fillStyle=p.color; ctx.translate(p.x,p.y);
    if(p.star){
      ctx.beginPath();
      for(let i=0;i<5;i++){const a=(Math.PI*2/5)*i-Math.PI/2,b=a+Math.PI/5;ctx.lineTo(Math.cos(a)*p.sz,Math.sin(a)*p.sz);ctx.lineTo(Math.cos(b)*p.sz*.42,Math.sin(b)*p.sz*.42);}
      ctx.closePath(); ctx.fill();
    } else {ctx.beginPath();ctx.arc(0,0,p.sz,0,Math.PI*2);ctx.fill();}
    ctx.restore();
  });
  if(flashAlpha>0){ctx.save();ctx.globalAlpha=flashAlpha;ctx.fillStyle='#fff';ctx.fillRect(0,0,canvas.width,canvas.height);ctx.restore();}
}

// ══════════════════════════════════════════
// GAME STATE
// ══════════════════════════════════════════
let G={};
let popAnims=[],swapAnim=null,chaining=false;
let timerFlashInterval=null,winTriggered=false;

function initState(lv){
  const cfg=LEVELS[lv];
  G={lv,score:0,moves:0,combo:0,maxCombo:0,pops:0,
    timeLeft:cfg.timeLimit,paused:false,over:false,
    remaining:{...cfg.tgt},
    grid:makeGrid(cfg.types),
    items:ITEM_DEFS.slice(0,cfg.itemSlots).map(d=>({...d,count:1}))
  };
  popAnims=[];swapAnim=null;chaining=false;particles=[];
  flashAlpha=0;shake={x:0,y:0,f:0};winTriggered=false;
  clearTimerFlash();
  buildTgtPanel();
  buildItemButtons();
}

function makeGrid(types){
  const g=[];
  for(let r=0;r<ROWS;r++){
    g[r]=[];
    for(let c=0;c<COLS;c++){
      let t,tries=0;
      do{t=ANIMALS[Math.floor(Math.random()*types)];g[r][c]={type:t};tries++;}
      while(tries<12&&groupIn(g,r,c).length>=3);
    }
  }
  return g;
}

// ══════════════════════════════════════════
// 아이템 버튼 — 동물 캐릭터 캔버스로 직접 그리기
// ══════════════════════════════════════════
function buildItemButtons(){
  const wrap=document.getElementById('item-btns');
  wrap.innerHTML='';

  G.items.forEach((item,idx)=>{
    const btn=document.createElement('button');
    btn.className='item-btn';
    btn.id='item-btn-'+idx;
    btn.onclick=()=>useItem(idx);

    // ★ 동물 캐릭터 캔버스
    const SZ=38;
    const bc=document.createElement('canvas');
    bc.width=SZ; bc.height=SZ;
    const bctx=bc.getContext('2d');

    // 반투명 원형 배경
    bctx.beginPath();
    bctx.arc(SZ/2,SZ/2,SZ/2-1,0,Math.PI*2);
    bctx.fillStyle='rgba(0,0,0,.2)';
    bctx.fill();

    // 동물 그리기 (drawAnimalCtx 사용 — 전역 ctx 안 씀!)
    drawAnimalCtx(bctx, SZ/2, SZ/2, item.animalType, SZ);

    btn.appendChild(bc);

    // 아이템 이름 라벨
    const lbl=document.createElement('div');
    lbl.className='item-btn-label';
    lbl.textContent=item.label;
    btn.appendChild(lbl);

    // 아이템 기능 뱃지 (우상단)
    const badge=document.createElement('div');
    badge.className='item-btn-badge';
    badge.textContent=item.badge;
    btn.appendChild(badge);

    // 잔여 횟수 (우하단)
    const cnt=document.createElement('div');
    cnt.className='item-btn-cnt';
    cnt.id='item-cnt-'+idx;
    cnt.textContent=item.count>0?item.count:'';
    btn.appendChild(cnt);

    if(item.count<=0) btn.classList.add('used');
    wrap.appendChild(btn);
  });
}

function updateItemButtons(){
  G.items.forEach((item,idx)=>{
    const btn=document.getElementById('item-btn-'+idx);
    const cnt=document.getElementById('item-cnt-'+idx);
    if(!btn||!cnt) return;
    cnt.textContent=item.count>0?item.count:'';
    item.count<=0?btn.classList.add('used'):btn.classList.remove('used');
  });
}

async function useItem(idx){
  if(G.paused||G.over||chaining) return;
  const item=G.items[idx];
  if(!item||item.count<=0) return;
  item.count--;
  updateItemButtons();

  if(item.id==='bomb'){
    let best=[],bestN=0;
    for(let r=0;r<ROWS;r++) for(let c=0;c<COLS;c++){const g=getGroup(r,c);if(g.length>bestN){best=g;bestN=g.length;}}
    if(best.length>=2){await popCells(best,true);await sleep(60);await autoChain();}
  } else if(item.id==='cross'){
    let best=[],bestN=0;
    for(let r=0;r<ROWS;r++) for(let c=0;c<COLS;c++){const g=getGroup(r,c);if(g.length>bestN){best=g;bestN=g.length;}}
    if(best.length>0){const mid=best[Math.floor(best.length/2)];await activateCross(mid.r,mid.c);}
  } else if(item.id==='reform'){
    const all=[];
    for(let r=0;r<ROWS;r++) for(let c=0;c<COLS;c++) if(G.grid[r][c]) all.push(G.grid[r][c].type);
    for(let i=all.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[all[i],all[j]]=[all[j],all[i]];}
    let k=0;for(let r=0;r<ROWS;r++) for(let c=0;c<COLS;c++) if(G.grid[r][c]) G.grid[r][c].type=all[k++];
    flashAlpha=.2;
    await sleep(60);await autoChain();
  }
  updateUI();
}

// ══════════════════════════════════════════
// FLOOD FILL
// ══════════════════════════════════════════
function groupIn(grid,r,c){
  if(!grid[r]||!grid[r][c]||grid[r][c].special) return [];
  const type=grid[r][c].type,vis=new Set(),res=[];
  function dfs(rr,cc){
    const k=rr*100+cc;
    if(vis.has(k)||rr<0||rr>=ROWS||cc<0||cc>=COLS) return;
    if(!grid[rr]||!grid[rr][cc]||grid[rr][cc].type!==type||grid[rr][cc].special) return;
    vis.add(k);res.push({r:rr,c:cc});
    dfs(rr-1,cc);dfs(rr+1,cc);dfs(rr,cc-1);dfs(rr,cc+1);
  }
  dfs(r,c); return res;
}
const getGroup=(r,c)=>groupIn(G.grid,r,c);

// ══════════════════════════════════════════
// POP
// ══════════════════════════════════════════
function popCells(cells,fromInteract=false){
  if(!cells.length) return Promise.resolve();
  const type=G.grid[cells[0].r][cells[0].c]?.type;
  const n=cells.length;
  const cfg=LEVELS[G.lv];
  const mult=n>=8?2.5:n>=6?2.0:n>=4?1.5:1.0;
  const pts=Math.round(n*cfg.pointPer*mult);

  G.score+=pts; G.pops+=n;
  if(fromInteract){G.combo++;G.maxCombo=Math.max(G.maxCombo,G.combo);}
  // ★ 셀별 타입으로 정확히 차감
  cells.forEach(({r,c})=>{
    const t=G.grid[r][c]?.type;
    if(t&&G.remaining[t]!==undefined) G.remaining[t]=Math.max(0,G.remaining[t]-1);
  });

  const isAllClear=fromInteract&&n>=6;

  let special=null,specialFinalR=-1,specialFinalC=-1;
  if(fromInteract&&!isAllClear){
    if(n>=5) special='cross';
    else if(n===4) special='bomb';
    if(special){
      const mid=cells[Math.floor(cells.length/2)];
      const mc=mid.c,mr=mid.r;
      const poppedInCol=new Set(cells.filter(x=>x.c===mc).map(x=>x.r));
      let survivorsAbove=0;
      for(let rr=0;rr<mr;rr++){if(!poppedInCol.has(rr)&&G.grid[rr][mc]) survivorsAbove++;}
      specialFinalR=survivorsAbove; specialFinalC=mc;
    }
  }

  cells.forEach(({r,c})=>{
    spawnParticles(c*CELL+CELL/2,r*CELL+CELL/2,CCSS[type]||'#fff',n);
    popAnims.push({r,c,t:0});
  });
  const fc=cells[Math.floor(cells.length/2)];
  addFloat('+'+pts,fc.c*CELL+CELL/2,fc.r*CELL);
  if(G.combo>=2) showCombo(G.combo);
  if(isAllClear) showAllClear();
  updateUI();

  return new Promise(res=>{
    setTimeout(async()=>{
      if(isAllClear){
        for(let r=0;r<ROWS;r++) for(let c=0;c<COLS;c++){
          if(G.grid[r][c]){
            const t=G.grid[r][c].type;
            if(t&&G.remaining[t]!==undefined) G.remaining[t]=Math.max(0,G.remaining[t]-1);
            spawnParticles(c*CELL+CELL/2,r*CELL+CELL/2,CCSS[t]||'#fff',3);
            G.grid[r][c]=null;
          }
        }
        flashAlpha=.5;shake.f=14;
        if(navigator.vibrate) navigator.vibrate([40,15,40,15,40,15,80]);
        await sleep(120);
        doRefill();
        G.combo=0;clearTimeout(comboResetTimer);
        document.getElementById('combo-badge').classList.remove('show');
      } else {
        cells.forEach(({r,c})=>{G.grid[r][c]=null;});
        doGravity();doRefill();
        if(special&&specialFinalR>=0){
          let placed=false;
          for(let rr=specialFinalR;rr<ROWS;rr++){
            const cell=G.grid[rr][specialFinalC];
            if(cell&&!cell.special){G.grid[rr][specialFinalC]={type,special};placed=true;break;}
          }
          if(!placed){
            for(let rr=0;rr<ROWS;rr++){
              const cell=G.grid[rr][specialFinalC];
              if(cell&&!cell.special){G.grid[rr][specialFinalC]={type,special};break;}
            }
          }
        }
      }
      popAnims=popAnims.filter(a=>!cells.find(x=>x.r===a.r&&x.c===a.c));
      updateUI();
      res();
    },180);
  });
}

function doGravity(){
  for(let c=0;c<COLS;c++){
    let e=ROWS-1;
    for(let r=ROWS-1;r>=0;r--){
      if(G.grid[r][c]){G.grid[e][c]=G.grid[r][c];if(e!==r)G.grid[r][c]=null;e--;}
    }
  }
}

function doRefill(){
  const types=LEVELS[G.lv].types;
  for(let r=0;r<ROWS;r++) for(let c=0;c<COLS;c++){
    if(!G.grid[r][c]){
      let t,tries=0;
      do{t=ANIMALS[Math.floor(Math.random()*types)];G.grid[r][c]={type:t};tries++;}
      while(tries<15&&groupIn(G.grid,r,c).length>=3);
    }
  }
  breakGroups();
}

function breakGroups(){
  const types=LEVELS[G.lv].types;
  let changed=true,pass=0;
  while(changed&&pass<5){
    changed=false;pass++;
    const vis=new Set();
    for(let r=0;r<ROWS;r++) for(let c=0;c<COLS;c++){
      if(!G.grid[r][c]||G.grid[r][c].special) continue;
      const k=r*100+c;if(vis.has(k)) continue;
      const g=groupIn(G.grid,r,c);
      g.forEach(({r,c})=>vis.add(r*100+c));
      if(g.length>=3){
        const mid=g[Math.floor(g.length/2)];
        const cur=G.grid[mid.r][mid.c].type;
        const others=ANIMALS.slice(0,types).filter(t=>t!==cur);
        G.grid[mid.r][mid.c]={type:others[Math.floor(Math.random()*others.length)]};
        changed=true;
      }
    }
  }
}

async function autoChain(){
  if(chaining) return;
  chaining=true;
  let found=true,round=0;
  while(found&&round<3){
    found=false;round++;
    const vis=new Set(),groups=[];
    for(let r=0;r<ROWS;r++) for(let c=0;c<COLS;c++){
      if(!G.grid[r][c]||G.grid[r][c].special) continue;
      const k=r*100+c;if(vis.has(k)) continue;
      const g=getGroup(r,c);
      if(g.length>=3){g.forEach(({r,c})=>vis.add(r*100+c));groups.push(g);found=true;}
    }
    if(groups.length){await Promise.all(groups.map(g=>popCells(g,false)));await sleep(80);}
  }
  chaining=false;
  checkWin();
}

const sleep=ms=>new Promise(r=>setTimeout(r,ms));

// ══════════════════════════════════════════
// SPECIAL ACTIVATE
// ══════════════════════════════════════════
async function activateSpecial(r,c){
  const cell=G.grid[r][c];
  if(!cell?.special) return;
  if(cell.special==='bomb') await activateBomb3x3(r,c);
  else await activateCross(r,c);
}

async function activateBomb3x3(r,c){
  const tgts=[];
  for(let dr=-1;dr<=1;dr++) for(let dc=-1;dc<=1;dc++){
    const nr=r+dr,nc=c+dc;
    if(nr>=0&&nr<ROWS&&nc>=0&&nc<COLS&&G.grid[nr][nc]) tgts.push({r:nr,c:nc});
  }
  await _blastTgts(tgts,r,c,'💥');
}

async function activateCross(r,c){
  const tgts=[];
  for(let i=0;i<COLS;i++) if(G.grid[r][i]) tgts.push({r,c:i});
  for(let i=0;i<ROWS;i++) if(G.grid[i][c]&&!tgts.find(t=>t.r===i&&t.c===c)) tgts.push({r:i,c});
  await _blastTgts(tgts,r,c,'✨');
}

async function _blastTgts(tgts,r,c,icon){
  if(!tgts.length) return;
  const pts=tgts.length*LEVELS[G.lv].pointPer*2;
  G.score+=pts;G.pops+=tgts.length;G.moves++;
  G.combo++;G.maxCombo=Math.max(G.maxCombo,G.combo);
  tgts.forEach(({r,c})=>{
    const t=G.grid[r][c];
    if(t&&G.remaining[t.type]!==undefined) G.remaining[t.type]=Math.max(0,G.remaining[t.type]-1);
    spawnParticles(c*CELL+CELL/2,r*CELL+CELL/2,CCSS[t?.type]||'#fff',tgts.length);
    popAnims.push({r,c,t:0});
  });
  addFloat(icon+'+'+pts,c*CELL+CELL/2,r*CELL);
  if(G.combo>=2) showCombo(G.combo);
  flashAlpha=.38;shake.f=9;
  if(navigator.vibrate) navigator.vibrate([30,10,30,10,30]);
  updateUI();
  await sleep(120);
  tgts.forEach(({r,c})=>{G.grid[r][c]=null;});
  doGravity();doRefill();popAnims=[];
  updateUI();
  await sleep(50);
  await autoChain();
}

// ══════════════════════════════════════════
// INPUT
// ══════════════════════════════════════════
let drag={on:false,r:-1,c:-1};

function evPos(e){
  const rect=canvas.getBoundingClientRect(),pt=e.touches?e.touches[0]:e;
  return{c:Math.floor((pt.clientX-rect.left)*canvas.width/rect.width/CELL),
         r:Math.floor((pt.clientY-rect.top)*canvas.height/rect.height/CELL)};
}

canvas.addEventListener('mousedown',onDown);
canvas.addEventListener('touchstart',onDown,{passive:false});
canvas.addEventListener('mousemove',onMove);
canvas.addEventListener('touchmove',onMove,{passive:false});
canvas.addEventListener('mouseup',onUp);
canvas.addEventListener('touchend',onUp,{passive:false});

function onDown(e){
  e.preventDefault();
  if(G.paused||G.over||chaining) return;
  const{r,c}=evPos(e);
  if(r<0||r>=ROWS||c<0||c>=COLS) return;
  drag={on:true,r,c};
}
async function onMove(e){
  e.preventDefault();
  if(!drag.on||G.paused||G.over||chaining) return;
  const{r,c}=evPos(e);
  const dr=r-drag.r,dc=c-drag.c;
  if(Math.abs(dr)+Math.abs(dc)!==1) return;
  const sr=drag.r,sc=drag.c;
  drag.on=false;
  await trySwap(sr,sc,r,c);
}
async function onUp(e){
  e.preventDefault();
  if(!drag.on) return;
  const{r,c}=drag;drag.on=false;
  if(r>=0&&r<ROWS&&c>=0&&c<COLS&&G.grid[r][c]?.special) await activateSpecial(r,c);
}

async function trySwap(r1,c1,r2,c2){
  const a=G.grid[r1][c1],b=G.grid[r2][c2];
  if(!a||!b) return;
  if(a.special){await activateSpecial(r1,c1);return;}
  if(b.special){await activateSpecial(r2,c2);return;}
  G.grid[r1][c1]=b;G.grid[r2][c2]=a;
  const g1=getGroup(r1,c1),g2=getGroup(r2,c2);
  if(g1.length>=3||g2.length>=3){
    G.combo++;G.maxCombo=Math.max(G.maxCombo,G.combo);
    armComboReset();
    const seen=new Set(),groups=[];
    for(const g of [g1,g2]){
      if(g.length<3) continue;
      const uniq=g.filter(({r,c})=>{const k=r*100+c;if(seen.has(k))return false;seen.add(k);return true;});
      if(uniq.length>=3) groups.push(uniq);
    }
    G.moves++;
    await Promise.all(groups.map(g=>popCells(g,true)));
    await sleep(60);
    await autoChain();
  } else {
    G.grid[r1][c1]=a;G.grid[r2][c2]=b;
    swapAnim={r1,c1,r2,c2,t:0};
    G.combo=0;clearTimeout(comboResetTimer);
  }
  updateUI();
}

// ══════════════════════════════════════════
// UI
// ══════════════════════════════════════════
function buildTgtPanel(){
  const cfg=LEVELS[G.lv];
  const grid=document.getElementById('tgt-grid');

    <div class="tgt-item" id="tgt-item-${k}">
      <div class="tgt-icon-wrap"><canvas id="tgt-canvas-${k}" width="28" height="28"></canvas></div>
      <div class="tgt-bar-wrap">
        <div class="tgt-name-row">
          <div class="tgt-name">${ANIMAL_NAME[k]||k}</div>
          <div class="tgt-count" id="tgt-count-${k}">0/${total}</div>
        </div>
        <div class="tgt-track">
          <div class="tgt-fill" id="tgt-fill-${k}"
            style="width:0%;background:linear-gradient(90deg,${ANIMAL_COLOR[k]},${ANIMAL_COLOR[k]}cc)"></div>
        </div>
      </div>
      <div class="tgt-check">✅</div>
    </div>
  `).join('');

  // ★ 목표 패널에도 동물 캐릭터 캔버스로 직접 그리기

    if(!bc) return;
    const SZ=28;
    bc.width=SZ;bc.height=SZ;
    const bctx=bc.getContext('2d');
    drawAnimalCtx(bctx,SZ/2,SZ/2,k,SZ);
  });
}

function updateTgtPanel(){
  const cfg=LEVELS[G.lv];
  let doneCount=0;
  Object.entries(cfg.tgt).forEach(([k,total])=>{
    const rem=G.remaining[k]??0;
    const done=total-rem;
    const isDone=rem<=0;
    if(isDone) doneCount++;
    const pct=Math.min(100,done/total*100);
    const item=document.getElementById('tgt-item-'+k);
    const fill=document.getElementById('tgt-fill-'+k);
    const count=document.getElementById('tgt-count-'+k);
    if(!item||!fill||!count) return;
    fill.style.width=pct+'%';
    fill.className='tgt-fill'+(isDone?' fill-done':'');
    count.textContent=`${done}/${total}`;
    count.className='tgt-count'+(isDone?' done-count':'');
    isDone?item.classList.add('done-item'):item.classList.remove('done-item');
  });
  document.getElementById('tgt-panel-summary').textContent=`${doneCount}/${Object.keys(cfg.tgt).length} 완료`;
}

function updateUI(){
  document.getElementById('score-val').textContent=G.score.toLocaleString();
  document.getElementById('lv-badge').textContent='ST.'+(G.lv+1);
  const cfg=LEVELS[G.lv];
  const goalPct=Math.min(100,G.score/cfg.scoreGoal*100);
  document.getElementById('score-goal-bar').style.width=goalPct+'%';
  document.getElementById('score-goal-label').textContent=
    `목표점수 ${G.score.toLocaleString()} / ${cfg.scoreGoal.toLocaleString()} ${goalPct>=100?'✅':''}`;
  updateTgtPanel();
}

let timerWarnSent=false;
function updateTimerUI(){
  const s=Math.ceil(G.timeLeft);
  const el=document.getElementById('timer-val');
  el.textContent=Math.floor(s/60)+':'+(s%60<10?'0':'')+(s%60);
  const flash=document.getElementById('timer-flash');
  if(G.timeLeft<=5){
    el.className='hdr-val critical';
    if(!timerFlashInterval) timerFlashInterval=setInterval(()=>flash.classList.toggle('pulse'),180);
  } else if(G.timeLeft<=15){
    el.className='hdr-val danger';
    if(!timerWarnSent){timerWarnSent=true;showScoreWarn('⚡ 15초 남았다!');if(navigator.vibrate)navigator.vibrate([40,20,40,20,40]);}
  } else {
    el.className='hdr-val';flash.classList.remove('pulse');timerWarnSent=false;
  }
}

function clearTimerFlash(){
  if(timerFlashInterval){clearInterval(timerFlashInterval);timerFlashInterval=null;}
  document.getElementById('timer-flash').classList.remove('pulse');
}

function addFloat(text,x,y){
  const wrap=document.getElementById('board-wrap');
  const rect=canvas.getBoundingClientRect(),wr=wrap.getBoundingClientRect();
  const el=document.createElement('div');
  el.className='fscore';el.textContent=text;
  el.style.left=(rect.left-wr.left+x*rect.width/canvas.width)+'px';
  el.style.top=(rect.top-wr.top+y*rect.height/canvas.height)+'px';
  wrap.appendChild(el);
  el.addEventListener('animationend',()=>el.remove());
}

let comboTimer,comboResetTimer=null;
const COMBO_WINDOW=600; // 더 짧게 — 콤보 유지 어렵게
function armComboReset(){
  clearTimeout(comboResetTimer);
  comboResetTimer=setTimeout(()=>{if(G.combo>0){G.combo=0;document.getElementById('combo-badge').classList.remove('show');}},COMBO_WINDOW);
}
function showCombo(n){
  const el=document.getElementById('combo-badge');
  el.textContent=n+'x COMBO! 🔥';el.classList.add('show');
  clearTimeout(comboTimer);comboTimer=setTimeout(()=>el.classList.remove('show'),800);
}
let allClearTimer;
function showAllClear(){
  const el=document.getElementById('allclear-badge');
  el.textContent='🌟 ALL CLEAR! 보드 리셋!';el.classList.add('show');
  clearTimeout(allClearTimer);allClearTimer=setTimeout(()=>el.classList.remove('show'),1400);
}
let warnTimer;
function showScoreWarn(msg){
  const el=document.getElementById('score-warn');
  el.textContent=msg;el.classList.add('show');
  clearTimeout(warnTimer);warnTimer=setTimeout(()=>el.classList.remove('show'),1200);
}
let stageClearTimer;
function showStageClearToast(){
  const el=document.getElementById('stage-clear-toast');
  el.textContent='🎉 스테이지 클리어!';el.classList.add('show');
  clearTimeout(stageClearTimer);stageClearTimer=setTimeout(()=>el.classList.remove('show'),900);
}

// ══════════════════════════════════════════
// GAME FLOW
// ══════════════════════════════════════════
function checkWin(){
  if(winTriggered||G.over) return;
  if(Object.values(G.remaining).every(v=>v<=0)){
    winTriggered=true;
    showStageClearToast();
    setTimeout(showClear,900);
  }
}

function showClear(){
  document.getElementById('clear-score').textContent=G.score.toLocaleString();
  document.getElementById('clear-moves').textContent=G.moves+'회';
  document.getElementById('clear-combo').textContent=G.maxCombo+'x';
  const isLast=G.lv>=LEVELS.length-1;
  document.getElementById('clear-sub').textContent=isLast?'전 스테이지 완료! 🏆':'완벽해요!';
  document.getElementById('next-btn').textContent=isLast?'🏆 처음부터':'다음 스테이지 →';
  show('ov-clear');
}

function showGameOver(){
  if(G.over) return;G.over=true;clearTimerFlash();
  const cfg=LEVELS[G.lv];
  const goalMet=G.score>=cfg.scoreGoal;
  document.getElementById('over-score').textContent=G.score.toLocaleString();
  document.getElementById('over-combo').textContent=G.maxCombo+'x';
  document.getElementById('over-pops').textContent=G.pops+'개';
  document.getElementById('over-goal').textContent=goalMet?'달성 ✅':'미달 ❌';
  document.getElementById('over-goal').style.color=goalMet?'#4ade80':'#f87171';
  document.getElementById('over-icon').textContent=goalMet?'🏅':'⏰';
  document.getElementById('over-title').textContent=goalMet?'목표 달성!':'시간 종료!';
  document.getElementById('over-sub').textContent=goalMet?`목표 ${cfg.scoreGoal.toLocaleString()}점 달성!`:'아쉽지만 다음엔!';
  document.getElementById('nick-input').value='';
  show('ov-over');
}

function nextLevel(){
  hide('ov-clear');
  const next=G.lv>=LEVELS.length-1?0:G.lv+1;
  initState(next);updateUI();
}

function restart(){
  ['ov-over','ov-rank','ov-clear','ov-pause'].forEach(hide);
  document.getElementById('pause-btn').textContent='⏸';
  clearTimerFlash();initState(0);updateUI();
}

function togglePause(){
  if(G.over) return;G.paused=!G.paused;
  document.getElementById('pause-btn').textContent=G.paused?'▶':'⏸';
  G.paused?show('ov-pause'):hide('ov-pause');
}

const show=id=>document.getElementById(id).classList.add('on');
const hide=id=>document.getElementById(id).classList.remove('on');

// ══════════════════════════════════════════
// RANKING
// ══════════════════════════════════════════
function loadRank(){try{return JSON.parse(localStorage.getItem(RANK_KEY)||'[]');}catch{return[];}}
function saveRank(list){try{localStorage.setItem(RANK_KEY,JSON.stringify(list));}catch{}}

function submitScore(){
  const nick=(document.getElementById('nick-input').value.trim()||'익명').slice(0,8);
  let list=loadRank();
  list.push({nick,score:G.score,st:G.lv+1,date:new Date().toLocaleDateString('ko-KR')});
  list.sort((a,b)=>b.score-a.score);list=list.slice(0,30);saveRank(list);
  hide('ov-over');renderRank(list,nick,G.score);show('ov-rank');
}

function renderRank(list,myNick,myScore){
  const el=document.getElementById('rank-list');
  if(!list.length){el.innerHTML='<div style="text-align:center;color:var(--sub);padding:18px">아직 기록이 없어요!</div>';return;}
  const mc=['g','s','b'];
  el.innerHTML=list.map((item,i)=>{
    const me=item.nick===myNick&&item.score===myScore;
    return`<div class="ri${me?' me':''}"><div class="rno ${mc[i]||''}">${i+1}</div><div class="rname">${item.nick}<span style="font-size:9px;color:var(--sub);margin-left:4px">ST${item.st||'?'}</span></div><div class="rscore">${item.score.toLocaleString()}</div></div>`;
  }).join('');
}

// ══════════════════════════════════════════
// RENDER
// ══════════════════════════════════════════
function render(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.save();ctx.translate(shake.x,shake.y);
  for(let r=0;r<ROWS;r++){
    for(let c=0;c<COLS;c++){
      const cell=G.grid[r][c];if(!cell) continue;
      const cx=c*CELL+CELL/2,cy=r*CELL+CELL/2;
      const pop=popAnims.find(a=>a.r===r&&a.c===c);
      if(pop){
        const t=pop.t,sc=t<.45?1+t*.55:(1-t)*1.9;
        if(sc>0.02) drawAnimal(cx,cy,cell.type,CELL,1-t*.75,sc);
        continue;
      }
      let ox=0;
      if(swapAnim){
        const isS=(r===swapAnim.r1&&c===swapAnim.c1)||(r===swapAnim.r2&&c===swapAnim.c2);
        if(isS) ox=Math.sin(swapAnim.t*Math.PI*5)*CELL*.1*(1-swapAnim.t);
      }
      drawAnimal(cx+ox,cy,cell.type,CELL);
      if(cell.special) drawSpecial(cx+ox,cy,cell.special,CELL);
    }
  }
  ctx.restore();
  renderParticles();
}

// ══════════════════════════════════════════
// LOOP
// ══════════════════════════════════════════
let last=0;
function loop(ts){
  const dt=Math.min(ts-last,80);last=ts;
  popAnims.forEach(a=>{a.t=Math.min(1,a.t+dt/240);});
  popAnims=popAnims.filter(a=>a.t<1);
  if(swapAnim){swapAnim.t=Math.min(1,swapAnim.t+dt/200);if(swapAnim.t>=1)swapAnim=null;}
  updateParticles(dt);
  if(!G.paused&&!G.over&&!winTriggered){
    G.timeLeft=Math.max(0,G.timeLeft-dt/1000);
    updateTimerUI();
    if(G.timeLeft<=0) showGameOver();
  }
  render();
  requestAnimationFrame(loop);
}

// ══════════════════════════════════════════
// START
// ══════════════════════════════════════════
window.addEventListener('resize',()=>{resizeCanvas();buildTgtPanel();buildItemButtons();updateUI();});
resizeCanvas();
initState(0);
updateUI();
requestAnimationFrame(loop);
</script>
